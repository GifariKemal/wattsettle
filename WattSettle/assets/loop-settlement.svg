<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="Alur satu loop WattSettle: Device menandatangani Reading, Kontrak, AI Verifier, Settlement">
  <defs>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="260" rx="22" fill="#0b0f14"/>
  <rect x="0.5" y="0.5" width="919" height="259" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <text x="36" y="42" fill="#e5e7eb" font-size="17" font-weight="700">WattSettle · Satu Loop Settlement</text>
  <text x="36" y="64" fill="#94a3b8" font-size="12.5">Reading ditandatangani, diverifikasi AI, lalu dibayar otomatis on-chain</text>

  <!-- wire -->
  <line x1="150" y1="150" x2="770" y2="150" stroke="url(#wire)" stroke-width="3" stroke-opacity="0.5"/>

  <!-- nodes -->
  <g text-anchor="middle">
    <!-- Device -->
    <circle cx="150" cy="150" r="30" fill="#0b0f14" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="150" cy="150" r="30" fill="url(#glowGreen)" opacity="0.0">
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="156" font-size="22">🔌</text>
    <text x="150" y="205" fill="#e5e7eb" font-size="13" font-weight="600">Device</text>
    <text x="150" y="223" fill="#64748b" font-size="11">Reading EIP-712</text>

    <!-- Contract -->
    <circle cx="357" cy="150" r="30" fill="#0b0f14" stroke="#f0b90b" stroke-width="2"/>
    <circle cx="357" cy="150" r="30" fill="url(#glowGreen)" opacity="0.0">
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <text x="357" y="156" font-size="22">📄</text>
    <text x="357" y="205" fill="#e5e7eb" font-size="13" font-weight="600">Kontrak</text>
    <text x="357" y="223" fill="#64748b" font-size="11">submitReading</text>

    <!-- Verifier -->
    <circle cx="564" cy="150" r="30" fill="#0b0f14" stroke="#a855f7" stroke-width="2"/>
    <circle cx="564" cy="150" r="30" fill="url(#glowGreen)" opacity="0.0">
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <text x="564" y="156" font-size="22">🤖</text>
    <text x="564" y="205" fill="#e5e7eb" font-size="13" font-weight="600">AI Verifier</text>
    <text x="564" y="223" fill="#64748b" font-size="11">Attestation</text>

    <!-- Settlement -->
    <circle cx="770" cy="150" r="30" fill="#0b0f14" stroke="#22c55e" stroke-width="2"/>
    <circle cx="770" cy="150" r="30" fill="url(#glowGreen)" opacity="0.0">
      <animate attributeName="opacity" values="0;0.9;0" dur="4s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <text x="770" y="156" font-size="22">💸</text>
    <text x="770" y="205" fill="#e5e7eb" font-size="13" font-weight="600">Settlement</text>
    <text x="770" y="223" fill="#64748b" font-size="11">bayar + fee 1%</text>
  </g>

  <!-- travelling packet -->
  <circle r="7" fill="#22c55e" filter="url(#soft)">
    <animate attributeName="cx" values="150;357;564;770" dur="4s" repeatCount="indefinite" keyTimes="0;0.33;0.66;1"/>
    <animate attributeName="cy" values="150;150;150;150" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.05;0.5;0.95;1"/>
  </circle>
</svg>
